# PartyAdder 설정
# 서버 구조:
# - 파티 정보 / 멤버 정보는 DB에 저장됩니다.
# - GUI 이름 / 메시지 / 로어는 이 파일에서 수정할 수 있습니다.
# - <config>는 아래 값으로 대체된다고 생각하면 됩니다.

settings:
  # DB 타입: sqlite 또는 mysql
  database-type: sqlite

  sqlite:
    # plugins/PartyAdder/party.db 로 저장됩니다.
    file: party.db

  mysql:
    host: localhost
    port: 3306
    database: partyadder
    user: root
    password: password
    use-ssl: false

  # 파티 최대 인원
  max-members: 8

  # 파티 이름 변경 허용 여부
  allow-rename: true

  # 파티 TP / TPALL 허용 여부
  allow-teleport: true

  # TP / TPALL 쿨타임(초)
  teleport-cooldown-seconds: 60

  # 파티 경험치 공유 허용 여부
  enable-xp-share: true

  # 공유 비율(%)
  xp-share-percent: 20.0

  # 파티원이 오프라인이 되면 자동 추방 여부
  kick-offline-members: true

  # 오프라인 후 자동 추방까지 걸리는 시간(초)
  offline-kick-seconds: 300

  # 파티장이 오프라인 추방 대상이면 파티 전체 삭제 여부
  delete-party-when-leader-offline: true

  # 초대/가입신청/삭제 확인 시간(초)
  confirm-seconds: 3

  # 초대/신청/삭제/자동추방 알림에서 클릭 메시지 표시 여부
  clickable-text: true

sound:
  error-sound: BLOCK_ANVIL_LAND
  sucess-sound: ENTITY_EXPERIENCE_ORB_PICKUP

